<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aplz Brand Assets — Final</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f4f3f0;font-family:system-ui,sans-serif;padding:40px;color:#111}
  h1{font-size:12px;letter-spacing:3px;color:#999;text-transform:uppercase;margin-bottom:40px}
  .section{margin-bottom:48px}
  .section-title{font-size:13px;font-weight:700;color:#666;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #ddd}
  .row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .item{text-align:center}
  .item img{display:block;margin-bottom:6px}
  .item-label{font-size:10px;color:#aaa}
  .bg-checker{background:repeating-conic-gradient(#e8e8e8 0% 25%, #fff 0% 50%) 50%/16px 16px;padding:12px;border-radius:8px;display:inline-block}
  .bg-dark{background:#0c0c0c;padding:12px;border-radius:8px;display:inline-block}
  .bg-indigo{background:#1B4F72;padding:12px;border-radius:8px;display:inline-block}
  .bg-white{background:#fff;padding:12px;border-radius:8px;display:inline-block;border:1px solid #eee}
</style>
</head>
<body>

<h1>Aplz Brand Assets — Baloo 2 × 藍朱組紐 確定版</h1>

<div class="section">
  <div class="section-title">SVG Logos</div>
  <div class="row">
    <div class="item"><div class="bg-white"><img src="aplz-logo-light.svg" height="44"></div><div class="item-label">Light</div></div>
    <div class="item"><div class="bg-dark"><img src="aplz-logo-dark.svg" height="44"></div><div class="item-label">Dark</div></div>
    <div class="item"><div class="bg-indigo"><img src="aplz-logo-indigo.svg" height="44"></div><div class="item-label">Indigo</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">SVG Icon (musubi knot only)</div>
  <div class="row">
    <div class="item"><div class="bg-white"><img src="aplz-icon.svg" width="36" height="36"></div><div class="item-label">36px</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">Favicon (PNG)</div>
  <div class="row">
    <div class="item"><div class="bg-checker"><img src="favicon-16-indigo.png"></div><div class="item-label">16px 藍</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-16-white.png"></div><div class="item-label">16px 白</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-32-indigo.png"></div><div class="item-label">32px 藍</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-32-white.png"></div><div class="item-label">32px 白</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-32-dark.png"></div><div class="item-label">32px 黒</div></div>
  </div>
  <div class="row">
    <div class="item"><div class="bg-checker"><img src="favicon-192-indigo.png" width="64"></div><div class="item-label">192px 藍</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-192-white.png" width="64"></div><div class="item-label">192px 白</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-512-indigo.png" width="80"></div><div class="item-label">512px 藍</div></div>
    <div class="item"><div class="bg-checker"><img src="favicon-512-white.png" width="80"></div><div class="item-label">512px 白</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">X (Twitter) Icon — 400x400</div>
  <div class="row">
    <div class="item"><img src="x-icon-indigo.png" width="100"><div class="item-label">藍背景</div></div>
    <div class="item"><img src="x-icon-white.png" width="100"><div class="item-label">白背景</div></div>
    <div class="item"><img src="x-icon-dark.png" width="100"><div class="item-label">黒背景</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">OGP Image — 1200x630</div>
  <div class="row">
    <div class="item"><img src="ogp-light.png" width="360"><div class="item-label">Light</div></div>
    <div class="item"><img src="ogp-dark.png" width="360"><div class="item-label">Dark</div></div>
    <div class="item"><img src="ogp-indigo.png" width="360"><div class="item-label">Indigo</div></div>
  </div>
</div>

</body>
</html>
