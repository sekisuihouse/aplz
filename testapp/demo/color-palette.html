<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e4e4e7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 700; }
  .gen-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border: 1px solid #2a2a2e;
    border-radius: 10px;
    background: #1a1a1e;
    color: #e4e4e7;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .gen-btn:hover { border-color: #22d3ee; }
  .gen-btn kbd {
    font-size: 11px;
    padding: 2px 6px;
    border: 1px solid #3a3a3e;
    border-radius: 4px;
    color: #71717a;
    font-family: inherit;
  }
  .palette {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .swatch {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding: 24px 8px;
    cursor: pointer;
    transition: flex 0.3s;
    position: relative;
  }
  .swatch:hover { flex: 1.3; }
  .hex {
    font-size: 15px;
    font-weight: 700;
    font-family: 'SFMono-Regular', 'Consolas', monospace;
    padding: 8px 14px;
    border-radius: 8px;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    text-transform: uppercase;
    user-select: none;
    transition: transform 0.15s;
  }
  .swatch:hover .hex { transform: scale(1.05); }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #22d3ee;
    color: #0f0f0f;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 24px;
    border-radius: 10px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 10;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  @media (max-width: 640px) {
    .palette { flex-direction: column; }
    .swatch { min-height: 0; flex: 1; }
    .swatch:hover { flex: 1.3; }
    .hex { font-size: 13px; }
  }
</style>
</head>
<body>
<header>
  <h1>Palette Generator</h1>
  <button class="gen-btn" onclick="generate()">Generate <kbd>space</kbd></button>
</header>
<div class="palette" id="palette"></div>
<div class="toast" id="toast">Copied!</div>
<script>
  const palette = document.getElementById('palette');
  const toast = document.getElementById('toast');
  let toastTimer;

  function hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);
    const f = n => Math.round(255 * (l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1))));
    return '#' + [f(0), f(8), f(4)].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function luminance(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    return 0.299 * r + 0.587 * g + 0.114 * b;
  }

  function generate() {
    const baseHue = Math.random() * 360;
    const strategy = Math.random();
    let hues;
    if (strategy < 0.33) {
      // Analogous
      hues = Array.from({ length: 5 }, (_, i) => (baseHue + i * 25 - 50) % 360);
    } else if (strategy < 0.66) {
      // Triadic spread
      hues = [0, 30, 120, 150, 240].map(o => (baseHue + o) % 360);
    } else {
      // Complementary + variations
      hues = [0, 15, 180, 195, 210].map(o => (baseHue + o) % 360);
    }

    palette.innerHTML = '';
    hues.forEach(h => {
      const s = 55 + Math.random() * 30;
      const l = 40 + Math.random() * 25;
      const hex = hslToHex(h, s, l);
      const textColor = luminance(hex) > 0.5 ? '#0f0f0f' : '#ffffff';

      const div = document.createElement('div');
      div.className = 'swatch';
      div.style.background = hex;
      div.innerHTML = `<span class="hex" style="color:${textColor}">${hex}</span>`;
      div.onclick = () => copyColor(hex);
      palette.appendChild(div);
    });
  }

  function copyColor(hex) {
    navigator.clipboard.writeText(hex.toUpperCase());
    toast.textContent = `Copied ${hex.toUpperCase()}`;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target === document.body) {
      e.preventDefault();
      generate();
    }
  });

  generate();
</script>
</body>
</html>
