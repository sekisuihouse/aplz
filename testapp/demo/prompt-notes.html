<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Notes</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f0f;color:#e4e4e7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column}
  header{padding:14px 20px;border-bottom:1px solid #2a2a2e;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  header h1{font-size:16px;font-weight:700;color:#22d3ee}
  .add-btn{padding:7px 16px;border:none;border-radius:8px;background:#22d3ee;color:#0f0f0f;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
  .add-btn:hover{background:#06b6d4}
  .layout{display:flex;flex:1;min-height:0}
  .sidebar{width:320px;border-right:1px solid #2a2a2e;display:flex;flex-direction:column;flex-shrink:0}
  .search-box{padding:12px;border-bottom:1px solid #1a1a1e}
  .search-box input{width:100%;padding:8px 12px;border:1px solid #2a2a2e;border-radius:8px;background:#1a1a1e;color:#e4e4e7;font-size:13px;outline:none;transition:border-color .2s}
  .search-box input:focus{border-color:#22d3ee}
  .search-box input::placeholder{color:#52525b}
  .list{flex:1;overflow-y:auto}
  .item{padding:14px 16px;border-bottom:1px solid #1a1a1e;cursor:pointer;transition:background .15s}
  .item:hover{background:#1a1a1e}
  .item.active{background:#1a1a1e;border-left:3px solid #22d3ee}
  .item-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-preview{font-size:12px;color:#52525b;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .detail{flex:1;padding:24px;overflow-y:auto;display:flex;flex-direction:column}
  .detail-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:12px}
  .detail-body{font-size:14px;line-height:1.8;color:#a1a1aa;white-space:pre-wrap;word-break:break-word;flex:1;font-family:'SFMono-Regular','Consolas',monospace;background:#1a1a1e;border:1px solid #2a2a2e;border-radius:10px;padding:16px}
  .detail-actions{display:flex;gap:8px;margin-top:16px}
  .detail-actions button{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #2a2a2e;transition:all .2s}
  .btn-copy{background:#22d3ee;color:#0f0f0f;border-color:#22d3ee}
  .btn-copy:hover{background:#06b6d4}
  .btn-del{background:transparent;color:#f87171;border-color:#3a3a3e}
  .btn-del:hover{background:#f87171;color:#0f0f0f;border-color:#f87171}
  .empty{flex:1;display:flex;align-items:center;justify-content:center;color:#3a3a3e;font-size:15px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:auto}
  .modal{background:#141416;border:1px solid #2a2a2e;border-radius:14px;padding:24px;width:90%;max-width:480px}
  .modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:#fff}
  .modal input,.modal textarea{width:100%;padding:10px 12px;border:1px solid #2a2a2e;border-radius:8px;background:#0f0f0f;color:#e4e4e7;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
  .modal input:focus,.modal textarea:focus{border-color:#22d3ee}
  .modal input::placeholder,.modal textarea::placeholder{color:#52525b}
  .modal textarea{margin-top:12px;height:180px;resize:vertical;font-family:'SFMono-Regular','Consolas',monospace;line-height:1.6}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .modal-actions button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:background .2s}
  .btn-cancel{background:#2a2a2e;color:#e4e4e7}
  .btn-cancel:hover{background:#3a3a3e}
  .btn-save{background:#22d3ee;color:#0f0f0f}
  .btn-save:hover{background:#06b6d4}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:#22d3ee;color:#0f0f0f;font-weight:600;font-size:13px;padding:8px 22px;border-radius:8px;opacity:0;transition:all .25s;pointer-events:none;z-index:200}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  @media(max-width:700px){
    .sidebar{width:100%;border-right:none;border-bottom:1px solid #2a2a2e;max-height:45vh}
    .layout{flex-direction:column}
  }
</style>
</head>
<body>
<header>
  <h1>Prompt Notes</h1>
  <button class="add-btn" onclick="openModal()">+ New</button>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="search-box"><input id="search" placeholder="Search prompts..." oninput="renderList()"></div>
    <div class="list" id="list"></div>
  </div>
  <div class="main">
    <div class="detail" id="detail"><div class="empty">Select a prompt or create a new one</div></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="e=>e.target===this&&closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">New Prompt</h2>
    <input id="inputTitle" placeholder="Title">
    <textarea id="inputBody" placeholder="Write your prompt..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="save()">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const STORAGE_KEY = 'prompt-notes';
const SAMPLES = [
  { id: '1', title: 'Code Generator', body: 'You are an expert software engineer. Given the following requirements, write clean, well-commented code.\n\nRequirements:\n- Language: [specify]\n- Framework: [specify]\n- Feature: [describe]\n\nPlease include:\n1. The main implementation\n2. Error handling\n3. Brief inline comments\n4. A usage example', ts: Date.now() - 3600000 },
  { id: '2', title: 'Writing Proofreader', body: 'Please proofread and improve the following text. Focus on:\n\n1. Grammar and spelling corrections\n2. Clarity and readability improvements\n3. Tone consistency\n4. Conciseness — remove redundant phrases\n\nProvide the corrected version first, then list the changes you made with brief explanations.\n\nText:\n[paste here]', ts: Date.now() - 7200000 },
  { id: '3', title: 'Brainstorm Partner', body: 'Act as a creative brainstorming partner. I will share a topic or problem, and you will:\n\n1. Generate 10 diverse ideas (mix conventional and unconventional)\n2. For each idea, add a one-line rationale\n3. Highlight the top 3 most promising ideas with a brief pros/cons analysis\n4. Suggest one unexpected combination of ideas\n\nTopic:\n[describe your topic]', ts: Date.now() - 10800000 }
];

let prompts = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || SAMPLES;
let activeId = null;
let editId = null;
let toastTimer;

function persist() { localStorage.setItem(STORAGE_KEY, JSON.stringify(prompts)); }

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('list');
  const filtered = prompts.filter(p => p.title.toLowerCase().includes(q) || p.body.toLowerCase().includes(q));
  filtered.sort((a, b) => b.ts - a.ts);
  list.innerHTML = filtered.length === 0
    ? '<div style="padding:24px;text-align:center;color:#3a3a3e;font-size:13px">No prompts found</div>'
    : filtered.map(p => `<div class="item${p.id === activeId ? ' active' : ''}" onclick="select('${p.id}')"><div class="item-title">${esc(p.title)}</div><div class="item-preview">${esc(p.body)}</div></div>`).join('');
}

function select(id) {
  activeId = id;
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  const detail = document.getElementById('detail');
  detail.innerHTML = `<div class="detail-title">${esc(p.title)}</div><div class="detail-body">${esc(p.body)}</div><div class="detail-actions"><button class="detail-actions btn-copy" onclick="copyPrompt()">Copy</button><button class="detail-actions btn-del" onclick="del('${p.id}')">Delete</button></div>`;
  renderList();
}

function copyPrompt() {
  const p = prompts.find(x => x.id === activeId);
  if (!p) return;
  navigator.clipboard.writeText(p.body);
  showToast('Copied!');
}

function del(id) {
  prompts = prompts.filter(x => x.id !== id);
  persist();
  if (activeId === id) { activeId = null; document.getElementById('detail').innerHTML = '<div class="empty">Select a prompt or create a new one</div>'; }
  renderList();
}

function openModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = 'New Prompt';
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputBody').value = '';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('inputTitle').focus();
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }

function save() {
  const title = document.getElementById('inputTitle').value.trim();
  const body = document.getElementById('inputBody').value.trim();
  if (!title || !body) return;
  const entry = { id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), title, body, ts: Date.now() };
  prompts.unshift(entry);
  persist();
  activeId = entry.id;
  select(entry.id);
  closeModal();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

renderList();
</script>
</body>
</html>
