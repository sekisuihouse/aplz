<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Preview</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    color: #e4e4e7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    border-bottom: 1px solid #2a2a2e;
    padding: 12px 16px;
    gap: 16px;
    align-items: center;
    flex-shrink: 0;
  }
  header h1 { font-size: 14px; font-weight: 600; color: #22d3ee; }
  .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #52525b;
    padding: 8px 16px;
    border-bottom: 1px solid #1a1a1e;
    flex-shrink: 0;
  }
  .panes {
    display: flex;
    flex: 1;
    min-height: 0;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane + .pane { border-left: 1px solid #2a2a2e; }
  textarea {
    flex: 1;
    background: transparent;
    color: #e4e4e7;
    border: none;
    resize: none;
    padding: 16px;
    font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    outline: none;
    tab-size: 2;
  }
  .preview {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    line-height: 1.7;
    font-size: 15px;
  }
  .preview h1 { font-size: 1.8em; font-weight: 700; margin: 0 0 12px; color: #fff; }
  .preview h2 { font-size: 1.4em; font-weight: 600; margin: 20px 0 8px; color: #fff; border-bottom: 1px solid #2a2a2e; padding-bottom: 6px; }
  .preview h3 { font-size: 1.15em; font-weight: 600; margin: 16px 0 6px; color: #fff; }
  .preview p { margin: 0 0 12px; }
  .preview ul, .preview ol { margin: 0 0 12px; padding-left: 24px; }
  .preview li { margin: 4px 0; }
  .preview a { color: #22d3ee; text-decoration: none; }
  .preview a:hover { text-decoration: underline; }
  .preview code {
    background: #1a1a1e;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SFMono-Regular', 'Consolas', monospace;
    font-size: 0.9em;
    color: #f0abfc;
  }
  .preview pre {
    background: #1a1a1e;
    border: 1px solid #2a2a2e;
    border-radius: 8px;
    padding: 14px;
    margin: 0 0 12px;
    overflow-x: auto;
  }
  .preview pre code { background: none; padding: 0; color: #e4e4e7; }
  .preview blockquote {
    border-left: 3px solid #22d3ee;
    padding-left: 14px;
    margin: 0 0 12px;
    color: #a1a1aa;
  }
  .preview hr { border: none; border-top: 1px solid #2a2a2e; margin: 16px 0; }
  .preview strong { color: #fff; }
  @media (max-width: 640px) {
    .panes { flex-direction: column; }
    .pane + .pane { border-left: none; border-top: 1px solid #2a2a2e; }
  }
</style>
</head>
<body>
<header><h1>Markdown Preview</h1></header>
<div class="panes">
  <div class="pane">
    <div class="label">Editor</div>
    <textarea id="editor" spellcheck="false"></textarea>
  </div>
  <div class="pane">
    <div class="label">Preview</div>
    <div class="preview" id="preview"></div>
  </div>
</div>
<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

editor.value = `# Hello, Markdown!

A simple **real-time** preview editor.

## Features

- Live preview as you type
- Dark theme
- Responsive layout

## Code Example

Inline \`code\` looks like this.

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}

console.log(greet("World"));
\`\`\`

## Links & Quotes

> The best way to predict the future is to invent it.

Check out [Markdown Guide](https://www.markdownguide.org/) for more syntax.

---

*Start editing on the left to see changes here.*`;

function render() {
  preview.innerHTML = marked.parse(editor.value);
}

editor.addEventListener('input', render);
render();
</script>
</body>
</html>
